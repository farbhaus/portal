name: CodeQL

# DISABLED until the repo is public. Code scanning (SARIF upload) requires GitHub
# Advanced Security on private repos, which is not enabled, so the analyze step
# fails with "Code scanning is not enabled for this repository". Code scanning is
# free on public repos — when this repo goes public, restore the triggers below
# (replace the `workflow_dispatch:`-only block) to re-enable automatic runs.
on:
  workflow_dispatch:
  # push:
  #   branches: [ "main" ]
  # pull_request:
  #   branches: [ "main", "dev" ]
  # schedule:
  #   # Weekly, Monday 06:00 UTC — catches advisories published since the last PR.
  #   - cron: '0 6 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [ python, javascript-typescript ]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-and-quality adds maintainability queries on top of the default
          # security set; drop to "security-extended" if it gets too noisy.
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
