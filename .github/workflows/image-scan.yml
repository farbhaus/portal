# Build the all-in-one farbhaus/portal image and scan it with Trivy for OS/library CVEs.
# Report-only for now (exit-code 0): results go to the Security tab but don't
# block merges, since base-image CVEs are often unfixable on our side. Flip
# exit-code to 1 once the noise is understood to make HIGH/CRITICAL blocking.
name: Image Scan

on:
  pull_request:
    branches: [ "main", "dev" ]
  push:
    branches: [ "main" ]
  schedule:
    # Weekly rescan picks up newly disclosed CVEs in already-built images.
    - cron: '0 7 * * 1'
  workflow_dispatch:

concurrency:
  group: image-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Trivy (farbhaus/portal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image (load locally, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: farbhaus/portal:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: farbhaus/portal:scan
          format: sarif
          output: trivy-portal.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
      - name: Upload results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-portal.sarif
          category: trivy-portal
