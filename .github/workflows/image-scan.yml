# Build the API and web images and scan them with Trivy for OS/library CVEs.
# Report-only for now (exit-code 0): results go to the Security tab but don't
# block merges, since base-image CVEs are often unfixable on our side. Flip
# exit-code to 1 once the noise is understood to make HIGH/CRITICAL blocking.
name: Image Scan

# DISABLED until the repo is public. The "Upload results to Security tab" step
# (upload-sarif) requires GitHub Advanced Security on private repos, which is not
# enabled, so it fails with "Resource not accessible by integration". Code
# scanning is free on public repos — when this repo goes public, restore the
# triggers below (replace the `workflow_dispatch:`-only block) to re-enable.
on:
  workflow_dispatch:
  # pull_request:
  #   branches: [ "main", "dev" ]
  # push:
  #   branches: [ "main" ]
  # schedule:
  #   # Weekly rescan picks up newly disclosed CVEs in already-built images.
  #   - cron: '0 7 * * 1'

concurrency:
  group: image-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Trivy (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [ api, web ]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image (load locally, no push)
        uses: docker/build-push-action@v7
        with:
          context: ./apps/${{ matrix.app }}
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: false
          load: true
          tags: portal-${{ matrix.app }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: portal-${{ matrix.app }}:scan
          format: sarif
          output: trivy-${{ matrix.app }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
      - name: Upload results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.app }}.sarif
          category: trivy-${{ matrix.app }}
