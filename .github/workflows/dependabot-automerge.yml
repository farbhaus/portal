# Auto-merge Dependabot PRs for patch + minor updates once required checks pass.
# Majors are excluded here on purpose: they may carry breaking changes (and for
# GitHub Actions, majors are how security fixes ship) — those get a manual review.
#
# DORMANT until the repo is public. `gh pr merge --auto` only merges after the
# branch's required status checks pass, which needs branch protection — and branch
# protection requires GitHub Pro or a public repo (private + free = not available).
# Without it, auto-merge can't gate on CI. The merge step below is therefore gated
# on AUTOMERGE_ENABLED; flip it to 'true' once the repo is public AND branch
# protection requires the CI checks. Note: "Allow auto-merge" itself also can't be
# enabled on a private free-plan repo — it unlocks (along with branch protection)
# when the repo goes public, so enable it then too.
name: Dependabot Auto-Merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

env:
  # Set to 'true' once branch protection requires CI on the default branch.
  AUTOMERGE_ENABLED: 'false'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for patch and minor updates only
        if: >-
          env.AUTOMERGE_ENABLED == 'true' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
           steps.metadata.outputs.update-type == 'version-update:semver-minor')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
