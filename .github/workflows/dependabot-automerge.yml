# Auto-merge Dependabot PRs for patch + minor updates once required checks pass.
# Majors are excluded here on purpose: they may carry breaking changes (and for
# GitHub Actions, majors are how security fixes ship) — those get a manual review.
#
# `gh pr merge --auto` only completes the merge after the branch's required status
# checks pass, so this relies on branch protection requiring the CI checks on the
# default branch (and the repo's "Allow auto-merge" setting being enabled). The
# merge step is gated on AUTOMERGE_ENABLED below as a kill switch.
name: Dependabot Auto-Merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

env:
  # Kill switch: set to 'false' to pause auto-merge without removing the workflow.
  AUTOMERGE_ENABLED: 'true'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for patch and minor updates only
        if: >-
          env.AUTOMERGE_ENABLED == 'true' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
           steps.metadata.outputs.update-type == 'version-update:semver-minor')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
