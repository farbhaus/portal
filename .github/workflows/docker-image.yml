name: Docker Image CI

# Builds the all-in-one farbhaus/portal image. On branch pushes / PRs it builds only (validates
# the Dockerfile). On a version tag (vX.Y.Z) it builds and PUSHES to Docker Hub.
#
# Publishing prerequisites (see docs/GO_PUBLIC.md), all inert until a v* tag is pushed:
#   - the farbhaus/portal repo exists on Docker Hub
#   - repo secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are set

permissions:
  contents: read

on:
  push:
    branches: [ "main", "dev" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata (tags from the git ref)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: farbhaus/portal
          # latest=auto (the default) also tags :latest on a semver tag push.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # Only on a version tag: log in so the build can push.
      - name: Log in to Docker Hub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and (on a tag) push the all-in-one image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
