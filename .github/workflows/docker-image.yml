name: Docker Image CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry (only on main)
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and (optionally) push API image
      uses: docker/build-push-action@v6
      with:
        context: ./apps/api
        file: ./apps/api/Dockerfile
        push: ${{ github.ref == 'refs/heads/main' }}
        tags: |
          ghcr.io/${{ github.repository_owner }}/portal-api:latest
          ghcr.io/${{ github.repository_owner }}/portal-api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and (optionally) push Web image
      uses: docker/build-push-action@v6
      with:
        context: ./apps/web
        file: ./apps/web/Dockerfile
        push: ${{ github.ref == 'refs/heads/main' }}
        tags: |
          ghcr.io/${{ github.repository_owner }}/portal-web:latest
          ghcr.io/${{ github.repository_owner }}/portal-web:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
