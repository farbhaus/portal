name: portal

services:
  portal_postgres:
    # Digest-pinned for reproducibility (tag kept for readability); Dependabot bumps both.
    image: postgres:16@sha256:ab47a724d0e37131ac950b98ff2beeb3fdb3bfcc592d73c6cc4b4e7626649671
    container_name: portal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-portal}
    volumes:
      - portal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portal} -d ${POSTGRES_DB:-portal}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - portal_net

  portal_redis:
    image: redis:7@sha256:33d7c9a245edd95e6703a0addbeaa48fe40c3b3b4783627a72085155462ebfdb
    container_name: portal_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - portal_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - portal_net

  portal_api:
    build:
      context: ../apps/api
    container_name: portal_api
    restart: unless-stopped
    command: ["api"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      portal_postgres:
        condition: service_healthy
      portal_redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - portal_net

  portal_worker:
    build:
      context: ../apps/api
    container_name: portal_worker
    restart: unless-stopped
    command: ["worker"]
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL}
    # The image defaults to non-root (uid/gid 10001), but this NFS export squashes non-root uids
    # (verified: uid 10001 is denied writes to the sync mount), so the worker — which writes synced
    # files — runs as root. It has no inbound network, so this is low risk; the internet-facing web
    # and the api stay non-root. If your share grants a specific uid instead, set that here.
    user: "0:0"
    volumes:
      # Sync destinations live on the host (local disk or NAS mounts). Bind the mount root with
      # rslave propagation so any filesystem mounted under it on the host (e.g. an fstab NAS mount)
      # appears inside the worker automatically — no per-mount compose edits. Source == target so a
      # rule's destination_path means the same path inside and outside the container.
      - ${SYNC_HOST_ROOT:-/mnt}:${SYNC_HOST_ROOT:-/mnt}:rslave
    depends_on:
      portal_redis:
        condition: service_healthy
    networks:
      - portal_net

  portal_web:
    build:
      context: ../apps/web
    container_name: portal_web
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://portal_api:8000
    depends_on:
      portal_api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - portal_net

  portal_caddy:
    image: caddy:2@sha256:cfeb0b281bc44a5a51fecde39e9e577c60d863c0b6196e6bbdf58fd00960887f
    container_name: portal_caddy
    restart: unless-stopped
    ports:
      # Loopback only — Portal is reachable only via an upstream host reverse proxy.
      - "127.0.0.1:${PORTAL_PORT:-18080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - portal_caddy_data:/data
      - portal_caddy_config:/config
    depends_on:
      - portal_api
      - portal_web
    networks:
      - portal_net

networks:
  portal_net:
    name: portal_net

volumes:
  portal_postgres_data:
  portal_redis_data:
  portal_caddy_data:
  portal_caddy_config:
